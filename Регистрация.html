<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        body{background-image: url(hleb.jpg); background-repeat: no-repeat;
        background-size: cover;}
        .conteiner{
            margin-top: 50px;
            margin-left: 200px;
            position: relative;
            width: 500px;
            height: 600px;
            border-radius: 20px;
            display: flex;
            text-align: center;
            align-items: center;
            border: rgb(134, 134, 134) solid 4px;
            border-radius: 10%;
        }
        .text{color: white; position: relative; left: 350px; top: 100px;}
        .input-box{
            position: relative;
            width: 100%;
            height: 15px;
            border-bottom: 2px solid rgb(255, 255, 255);
            margin: 20px 0;
        }
        .input-box input{
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;   
            position: relative;
            bottom: 5px;
        }
        .btn{
            width: 400px;
            height: 40px;
            border: 2px solid rgb(66, 66, 66);
            border-radius: 10px;
            background: rgb(56, 56, 56);
            color: white;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        .btm{
            width: 400px;
            height: 40px;
            border: 2px solid rgb(66, 66, 66);
            border-radius: 10px;
            background: rgb(56, 56, 56);
            color: white;
        }
        #color-1{
            color: white;
        }
        input::placeholder{
            color: white;
        }
        textarea::placeholder{
            color: white;
        }
        textarea {
            resize: both;
            overflow: scroll;
            overflow-clip-margin: 20px;
        }
        button:active{
            color: rgb(40, 78, 78);
        }
        .btn:active{
            background: rgb(40, 78, 78); color: white;
        }
        .btm:active{
            background: rgb(40, 78, 78); color: white;
        }
    </style>
</head>
<div class="text"><h1>Регистрация</h1></div>
<div class="conteiner">
    <div class="form-box">
        <form>
            <div class="input-box">
                <input type="name" id="color-1" required placeholder="Введите ФИО">
                <label></label>
            </div>
            <div class="input-box">
                <input type="text" id="color-1" required placeholder="Введите логин">
                <label></label>
            </div>
            <div class="input-box">
                <input type="password" id="color-1" required placeholder="Введите пароль">
                <label></label>
            </div>
            <div class="input-box">
                <input type="email" id="color-1" required placeholder="Введите адрес электронной почты">
                <label></label>
            </div>
            <div class="input-box">
                <input type="date" required id="color-1">
                <label></label>
            </div>
            <div class="input-box">
                <input type="number" id="color-1" required placeholder="Введите номер телефона">
                <label></label>
            </div>
            <button type="sumbit" class="btm">Очистить</button>
            <button type="sumbit" class="btn">Отправить</button>
        </form>
    </div>
</div>
</body>
</html>
